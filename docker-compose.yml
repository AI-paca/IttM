services:
  ocr:
    build:
      context: ./ocr
      dockerfile: ../docker/ocr.Dockerfile
      args:
        OCR_REQUIREMENTS: "${OCR_REQUIREMENTS:-requirements-ci.txt}"
        OCR_CONTAINER_PORT: "${OCR_HOST_PORT:-8000}"
    network_mode: host
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "${OCR_HOST_PORT:-8000}"
    environment:
      - PORT=${OCR_HOST_PORT:-8000}
      - DISABLE_RUNTIME_EASYOCR_INSTALL=${DISABLE_RUNTIME_EASYOCR_INSTALL:-0}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import json, os, urllib.request; port=os.environ.get(''PORT'', ''8000''); data=json.load(urllib.request.urlopen(f''http://127.0.0.1:{port}/readiness'', timeout=2)); raise SystemExit(0 if data.get(''ready'') else 1)"',
        ]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    expose:
      - 3000
    environment:
      - PORT=3000
      - OCR_URL=http://host.docker.internal:${OCR_HOST_PORT:-8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ocr:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "${GATEWAY_HOST_BIND:-127.0.0.1}:${GATEWAY_HOST_PORT:-3000}:80"
    depends_on:
      - gateway
    restart: unless-stopped
