services:
  ocr:
    build:
      context: ./ocr
      dockerfile: ../docker/ocr.Dockerfile
    network_mode: host
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "${OCR_HOST_PORT:-8000}"
    environment:
      - PORT=${OCR_HOST_PORT:-8000}
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    expose:
      - 3000
    environment:
      - PORT=3000
      - OCR_URL=http://host.docker.internal:${OCR_HOST_PORT:-8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ocr
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "${GATEWAY_HOST_BIND:-127.0.0.1}:${GATEWAY_HOST_PORT:-3000}:80"
    depends_on:
      - gateway
    restart: unless-stopped
