services:
  ocr:
    build:
      context: ./ocr
      dockerfile: ../ocr.Dockerfile
    ports:
      - "${OCR_HOST_BIND:-127.0.0.1}:${OCR_HOST_PORT:-8000}:8000"
    environment:
      - PORT=8000
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    ports:
      - "${GATEWAY_HOST_BIND:-127.0.0.1}:${GATEWAY_HOST_PORT:-3000}:3000"
    depends_on:
      - ocr
    restart: unless-stopped
