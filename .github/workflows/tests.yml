name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: JS/TS Prettier check
        run: npx prettier --check .

      - name: JS/TS ESLint
        run: npx eslint .

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build OCR Docker image
        run: docker build -f ocr.Dockerfile -t ittm-ocr-ci ./ocr

      - name: Python flake8
        run: docker run --rm ittm-ocr-ci python -m flake8 .

      - name: Python Black check
        run: docker run --rm ittm-ocr-ci python -m black --check .

      - name: Python Ruff check
        run: docker run --rm ittm-ocr-ci python -m ruff check .

  frontend-gateway:
    runs-on: ubuntu-latest
    needs: [linters]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Nginx gateway Docker image
        run: docker build -f nginx.Dockerfile -t ittm-nginx-ci .

  python:
    runs-on: ubuntu-latest
    needs: [linters]
    steps:
      - uses: actions/checkout@v4

      - name: Build OCR Docker image
        run: docker build -f ocr.Dockerfile -t ittm-ocr-ci ./ocr

      - name: Python tests
        run: docker run --rm ittm-ocr-ci python -m pytest tests -q

  ocr-quality:
    runs-on: ubuntu-latest
    needs: [linters, frontend-gateway, python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Tesseract.js data
        uses: actions/cache@v4
        with:
          path: .cache/tesseract-js
          key: tesseract-js-${{ runner.os }}-eng-rus-chi-sim-v2

      - name: Install npm dependencies
        run: npm ci

      - name: Build OCR Docker image
        run: docker build -f ocr.Dockerfile -t ittm-ocr-ci ./ocr

      - name: Prepare OCR fixtures and tessdata from Docker image
        run: |
          set -euo pipefail

          mkdir -p .cache/tessdata ocr/tests/fixtures

          container_id="$(docker create ittm-ocr-ci python tests/quality_fixtures.py)"
          cleanup() {
            docker rm -f "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          if docker start -a "$container_id" && docker cp "$container_id:/app/tests/fixtures/." ocr/tests/fixtures/; then
            echo "Generated OCR fixtures inside Docker image and copied them out."
          else
            echo "Docker cp fixture path failed; retrying with a mounted fixture directory."
            docker run --rm \
              -v "${PWD}/ocr/tests/fixtures:/app/tests/fixtures" \
              ittm-ocr-ci \
              python tests/quality_fixtures.py
          fi

          for lang in eng rus chi_sim; do
            if docker cp "$container_id:/usr/share/tesseract-ocr/5/tessdata/${lang}.traineddata" ".cache/tessdata/"; then
              echo "Copied ${lang}.traineddata from Docker image."
            else
              echo "Default tessdata path failed for ${lang}; searching inside Docker image."
              docker run --rm \
                -v "${PWD}/.cache/tessdata:/out" \
                ittm-ocr-ci \
                sh -c 'set -eu
                  lang="$1"
                  for dir in /usr/share/tesseract-ocr/5/tessdata /usr/share/tesseract-ocr/4.00/tessdata; do
                    if [ -s "$dir/$lang.traineddata" ]; then
                      cp "$dir/$lang.traineddata" "/out/$lang.traineddata"
                      exit 0
                    fi
                  done
                  echo "Missing $lang.traineddata in known tessdata paths" >&2
                  exit 1' sh "$lang"
            fi
            test -s ".cache/tessdata/${lang}.traineddata"
          done

          for fixture in multilingual.png multilingual.jpg multilingual.webp multilingual.pdf multilingual.txt; do
            test -s "ocr/tests/fixtures/${fixture}"
          done

      - name: Verify OCR quality files
        run: |
          set -euo pipefail
          files=(
            .cache/tessdata/eng.traineddata
            .cache/tessdata/rus.traineddata
            .cache/tessdata/chi_sim.traineddata
            ocr/tests/fixtures/multilingual.png
            ocr/tests/fixtures/multilingual.jpg
            ocr/tests/fixtures/multilingual.webp
            ocr/tests/fixtures/multilingual.pdf
            ocr/tests/fixtures/multilingual.txt
          )

          for file in "${files[@]}"; do
            test -s "$file"
          done

          if sha256sum "${files[@]}"; then
            echo "Recorded SHA256 snapshot for OCR quality inputs."
          else
            echo "sha256sum failed; falling back to byte-size snapshot."
            wc -c "${files[@]}"
          fi

      - name: Browser OCR strict multilingual test
        env:
          BROWSER_OCR_LANG_PATH: ${{ github.workspace }}/.cache/tessdata
        run: |
          set -euo pipefail
          npm run test:ocr:browser || {
            echo "Browser OCR failed once; clearing Tesseract.js cache and retrying."
            rm -rf .cache/tesseract-js
            npm run test:ocr:browser
          }

      - name: Backend OCR strict multilingual test
        env:
          RUN_OCR_QUALITY: "1"
        run: |
          docker run --rm \
            -e RUN_OCR_QUALITY="${RUN_OCR_QUALITY}" \
            -v "${PWD}/ocr/tests/fixtures:/app/tests/fixtures" \
            ittm-ocr-ci \
            python -m pytest tests/test_ocr_quality.py -q
