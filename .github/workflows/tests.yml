name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Semgrep SAST
        run: npm run test:sast

      - name: Upload Semgrep SAST artifacts
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: semgrep-sast
          path: |
            .sast/semgrep.json
            .sast/semgrep.sarif
          if-no-files-found: warn

  node-fast:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npx eslint .

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Engine profile documentation contract
        run: npm run test:engine-docs

      - name: Unit tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: GitHub Pages OCR asset regression
        run: npm run build:pages && npm run test:pages

  python-fast:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Build OCR test image
        run: docker build -f docker/ocr.Dockerfile --target test --build-arg PYTHON_REQUIREMENTS=requirements-ci.txt --build-arg OCR_INSTALL_CJK_FONTS=1 -t ittm-ocr-ci ./ocr

      - name: Python style checks
        run: |
          docker run --rm ittm-ocr-ci python -m flake8 .
          docker run --rm ittm-ocr-ci python -m black --check .
          docker run --rm ittm-ocr-ci python -m ruff check .

      - name: Python API, engine, and layout tests
        run: |
          docker run --rm \
            -v "${PWD}/scripts:/scripts:ro" \
            -v "${PWD}/debug:/debug:ro" \
            -v "${PWD}/LLM-OCR:/LLM-OCR:ro" \
            ittm-ocr-ci \
            python -m pytest tests/api tests/engines tests/layout tests/debug -q

  compose-config:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Validate Docker Compose config
        run: docker compose config --quiet
