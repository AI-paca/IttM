name: Dependabot auto-merge

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Find Dependabot grouped pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          pr_json="$(
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/pull_requests" \
              --jq 'map(select(.user.login == "dependabot[bot]")) | first'
          )"

          if [ -z "$pr_json" ] || [ "$pr_json" = "null" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          number="$(jq -r '.number' <<<"$pr_json")"
          pr="$(gh pr view "$number" --json headRefName,title,url)"
          title="$(jq -r '.title' <<<"$pr")"
          head_ref="$(jq -r '.headRefName' <<<"$pr")"

          if [[ "$title" != *"minor-and-patch"* && "$head_ref" != *"minor-and-patch"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url' <<<"$pr")" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: ${{ steps.pr.outputs.skip == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: gh pr merge --auto --squash "$PR_URL"
