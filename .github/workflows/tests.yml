name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint and typecheck
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ocr/requirements-ci.txt

      - name: Install OCR system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-eng tesseract-ocr-rus

      - name: Install Python dependencies
        run: python -m pip install -r ocr/requirements-ci.txt

      - name: Python tests
        run: python -m pytest ocr/tests -q

  ocr-quality:
    runs-on: ubuntu-latest
    needs: [frontend-gateway, python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ocr/requirements-ci.txt

      - name: Cache Tesseract.js data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tesseract
          key: tesseract-js-${{ runner.os }}-eng-rus-chi-sim-v1

      - name: Install strict OCR system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-cjk \
            poppler-utils \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-rus \
            tesseract-ocr-chi-sim

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r ocr/requirements-ci.txt

      - name: Generate OCR fixtures
        run: python ocr/tests/quality_fixtures.py

      - name: Browser OCR strict multilingual test
        run: npm run test:ocr:browser

      - name: Backend OCR strict multilingual test
        env:
          RUN_OCR_QUALITY: "1"
        run: python -m pytest ocr/tests/test_ocr_quality.py -q
